<div id="guests-container">
    <div class="guest-entry">
        <h3 style="font-family: var(--font-serif); font-size: 1.3rem; margin-top: 0; color: var(--primary);">Invité #1 (Principal)</h3>
        <div class="form-group">
            <label>Nom complet</label>
            <input type="text" class="guest-name" required placeholder="Prénom Nom">
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div class="form-group">
                <label>Courriel</label>
                <input type="email" class="guest-email" placeholder="exemple@mail.com">
            </div>
            <div class="form-group">
                <label>Cellulaire</label>
                <input type="tel" class="guest-phone" placeholder="514-000-0000">
            </div>
        </div>
        <div class="form-group">
            <label>Choix de repas</label>
            <select class="guest-meal" required>
                <option value="">Choisir...</option>
                <option value="Repas 1">Repas 1</option>
                <option value="Repas 2">Repas 2</option>
            </select>
        </div>
        <div class="form-group">
            <label>Allergies / Restrictions</label>
            <input type="text" class="guest-rest" placeholder="Ex: Sans gluten, végétarien...">
        </div>
        <div class="form-group">
            <label>Une chanson pour vous faire danser ?</label>
            <input type="text" class="guest-song" placeholder="Artiste - Titre">
        </div>
    </div>
</div>

<script>
    const container = document.getElementById('guests-container');
    const addBtn = document.getElementById('add-guest-btn');

    addBtn.addEventListener('click', () => {
        const count = container.querySelectorAll('.guest-entry').length;
        const div = document.createElement('div');
        div.className = 'guest-entry';
        div.style.marginTop = "30px";
        div.style.paddingTop = "30px";
        div.innerHTML = `
            <h3 style="font-family: var(--font-serif); font-size: 1.3rem; margin-top: 0; color: var(--primary);">
                Invité #${count + 1} 
                <span class="remove-btn" onclick="this.parentElement.parentElement.remove()" style="float:right; font-size: 0.75rem; cursor:pointer; color:#e74c3c;">SUPPRIMER</span>
            </h3>
            <div class="form-group">
                <label>Nom complet</label>
                <input type="text" class="guest-name" required placeholder="Prénom Nom">
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="form-group">
                    <label>Courriel</label>
                    <input type="email" class="guest-email" placeholder="exemple@mail.com">
                </div>
                <div class="form-group">
                    <label>Cellulaire</label>
                    <input type="tel" class="guest-phone" placeholder="514-000-0000">
                </div>
            </div>
            <div class="form-group">
                <label>Choix de repas</label>
                <select class="guest-meal" required>
                    <option value="">Choisir...</option>
                    <option value="Repas 1">Repas 1</option>
                    <option value="Repas 2">Repas 2</option>
                </select>
            </div>
            <div class="form-group">
                <label>Allergies / Restrictions</label>
                <input type="text" class="guest-rest">
            </div>
            <div class="form-group">
                <label>Une chanson pour vous faire danser ?</label>
                <input type="text" class="guest-song" placeholder="Artiste - Titre">
            </div>
        `;
        container.appendChild(div);
    });

    document.getElementById('wedding-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submit-btn');
        const status = document.getElementById('status-message');
        const formCard = document.querySelector('.form-card');
        
        btn.disabled = true;
        status.innerText = "Envoi en cours...";

        const guestEntries = container.querySelectorAll('.guest-entry');
        const guests = Array.from(guestEntries).map(el => ({
            name: el.querySelector('.guest-name').value,
            email: el.querySelector('.guest-email').value, // <--- Nouveau
            phone: el.querySelector('.guest-phone').value, // <--- Nouveau
            meal: el.querySelector('.guest-meal').value,
            restrictions: el.querySelector('.guest-rest').value,
            song: el.querySelector('.guest-song').value
        }));

        try {
            const response = await fetch('/api/rsvp', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    groupName: guests[0].name,
                    guests: guests
                })
            });

            if (response.ok) {
                formCard.innerHTML = `
                    <div style="text-align: center; padding: 40px 20px;">
                        <div style="font-size: 3.5rem; margin-bottom: 20px;">✨</div>
                        <h2 style="font-family: var(--font-serif); color: var(--primary); margin-bottom: 15px; font-size: 2.2rem;">C'est confirmé !</h2>
                        <p style="font-size: 1.1rem; line-height: 1.6;">Merci beaucoup ! Vos réponses ont été enregistrées avec succès.</p>
                    </div>
                `;
                formCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
            } else {
                const resData = await response.json();
                throw new Error(resData.error || "Erreur lors de l'envoi");
            }
        } catch (err) {
            status.innerText = "Oups : " + err.message;
            status.style.color = "#e74c3c";
            btn.disabled = false;
        }
    });
</script>
