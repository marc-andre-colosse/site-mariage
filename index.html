<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>RSVP | Notre Mariage</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #af946d; --bg: #fdfcf9; --text: #2c3e50; }
        * { box-sizing: border-box; }
        body { font-family: 'Lato', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 40px auto; }
        .form-card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        h1, h2, h3 { font-family: 'Playfair Display', serif; text-align: center; }
        h3 { border-bottom: 1px solid #eee; padding-bottom: 10px; margin-top: 0; color: var(--primary); }
        .guest-entry { padding: 20px 0; border-bottom: 1px dashed #ddd; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 0.9rem; font-weight: bold; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 1rem; }
        .btn-add { background: none; border: 2px dashed var(--primary); color: var(--primary); width: 100%; padding: 15px; border-radius: 6px; cursor: pointer; font-weight: bold; margin-bottom: 20px; }
        .btn-submit { width: 100%; padding: 18px; background: var(--primary); color: white; border: none; border-radius: 6px; font-size: 1.1rem; cursor: pointer; font-weight: bold; }
        .btn-submit:disabled { background: #ccc; }
        #status-message { margin-top: 20px; padding: 15px; border-radius: 6px; text-align: center; display: none; }
        .success { display: block; background: #dcfce7; color: #15803d; }
        .error { display: block; background: #fee2e2; color: #b91c1c; }
        .remove-btn { color: #e74c3c; cursor: pointer; font-size: 0.8rem; float: right; }
    </style>
</head>
<body>

<div class="container">
    <div class="form-card">
        <h2>RSVP Mariage</h2>
        <form id="wedding-form">
            <div id="guests-container">
                <div class="guest-entry">
                    <h3>Invité #1</h3>
                    <div class="form-group">
                        <label>Nom complet</label>
                        <input type="text" class="guest-name" required placeholder="Prénom Nom">
                    </div>
                    <div class="form-group">
                        <label>Choix de repas</label>
                        <select class="guest-meal" required>
                            <option value="">Choisir...</option>
                            <option value="Repas 1">Repas 1</option>
                            <option value="Repas 2">Repas 2</option>
                                                    </select>
                    </div>
                    <div class="form-group">
                        <label>Allergies / Restrictions</label>
                        <input type="text" class="guest-rest" placeholder="Ex: Noix, gluten...">
                    </div>
                    <div class="form-group">
                        <label>Une chanson qui vous fait danser ?</label>
                        <input type="text" class="guest-song" placeholder="Artiste - Titre">
                    </div>
                </div>
            </div>

            <button type="button" class="btn-add" id="add-guest-btn">+ Ajouter un invité</button>
            <button type="submit" class="btn-submit" id="submit-btn">Confirmer pour le groupe</button>
            <div id="status-message"></div>
        </form>
    </div>
</div>

<script>
    const container = document.getElementById('guests-container');
    const addBtn = document.getElementById('add-guest-btn');

    addBtn.addEventListener('click', () => {
        const count = container.querySelectorAll('.guest-entry').length;
        const div = document.createElement('div');
        div.className = 'guest-entry';
        div.innerHTML = `
            <h3>Invité #${count + 1} <span class="remove-btn" onclick="this.parentElement.parentElement.remove()">Supprimer</span></h3>
            <div class="form-group">
                <label>Nom complet</label>
                <input type="text" class="guest-name" required>
            </div>
            <div class="form-group">
                <label>Choix de repas</label>
                 <select class="guest-meal" required>
                            <option value="">Choisir...</option>
                            <option value="Repas 1">Repas 1</option>
                            <option value="Repas 2">Repas 2</option>
                                                    </select>
            </div>
            <div class="form-group">
                <label>Allergies / Restrictions</label>
                <input type="text" class="guest-rest">
            </div>
            <div class="form-group">
                <label>Une chanson qui vous fait danser ?</label>
                <input type="text" class="guest-song" placeholder="Artiste - Titre">
            </div>
        `;
        container.appendChild(div);
    });

    document.getElementById('wedding-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submit-btn');
        const status = document.getElementById('status-message');
        btn.disabled = true;
        status.innerText = "Envoi en cours...";
        status.className = "";

        const guestEntries = container.querySelectorAll('.guest-entry');
        const guests = Array.from(guestEntries).map(el => ({
            name: el.querySelector('.guest-name').value,
            meal: el.querySelector('.guest-meal').value,
            restrictions: el.querySelector('.guest-rest').value,
            song: el.querySelector('.guest-song').value // <--- On récupère la chanson ici
        }));

        try {
            const response = await fetch('/api/rsvp', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    groupName: guests[0].name,
                    guests: guests
                })
            });

            const resData = await response.json();

            if (response.ok) {
                status.innerText = "Parfait ! Vos réponses sont enregistrées. ✨";
                status.className = "success";
                e.target.style.display = 'none';
            } else {
                throw new Error(resData.error || "Erreur lors de l'envoi");
            }
        } catch (err) {
            status.innerText = "Oups : " + err.message;
            status.className = "error";
            btn.disabled = false;
        }
    });
</script>

</body>
</html>
