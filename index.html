<section id="rsvp">
    <div class="form-card">
        <h2>Confirmer votre présence</h2>
        <form id="wedding-form">
            <div class="guest-section">
                <h3>Personne 1</h3>
                <div class="form-group">
                    <label>Nom complet *</label>
                    <input type="text" name="name1" required placeholder="Prénom et Nom">
                </div>
                <div class="form-group">
                    <label>Choix de repas *</label>
                    <select name="meal1" required>
                        <option value="">Sélectionnez un plat...</option>
                        <option value="Boeuf">Filet de bœuf</option>
                        <option value="Saumon">Saumon à l'aneth</option>
                        <option value="Vegetarien">Option Végétarienne</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Restrictions (Allergies...)</label>
                    <input type="text" name="rest1" placeholder="Laissez vide si aucune">
                </div>
            </div>

            <div class="plus-one-toggle">
                <label for="plusOne">Serez-vous accompagné(e) ?</label>
                <select id="plusOne" name="plusOne" onchange="toggleGuest2()">
                    <option value="Non">Je viens seul(e)</option>
                    <option value="Oui">Je viens avec un +1</option>
                </select>
            </div>

            <div id="section-guest-2" class="guest-section hidden">
                <h3>Personne 2</h3>
                <div class="form-group">
                    <label>Nom complet *</label>
                    <input type="text" id="name2" name="name2" placeholder="Prénom et Nom">
                </div>
                <div class="form-group">
                    <label>Choix de repas *</label>
                    <select id="meal2" name="meal2">
                        <option value="">Sélectionnez un plat...</option>
                        <option value="Boeuf">Filet de bœuf</option>
                        <option value="Saumon">Saumon à l'aneth</option>
                        <option value="Vegetarien">Option Végétarienne</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Restrictions (Allergies...)</label>
                    <input type="text" name="rest2" placeholder="Laissez vide si aucune">
                </div>
            </div>

            <button type="submit" id="submit-btn">Envoyer ma réponse</button>
            <p id="status-message"></p>
        </form>
    </div>
</section>

<style>
    /* Optimisation du CSS pour le formulaire */
    .form-card {
        background: white;
        padding: 40px;
        border-radius: 15px;
        box-shadow: 0 15px 35px rgba(0,0,0,0.05);
        max-width: 600px;
        margin: 0 auto;
    }
    .guest-section { margin-bottom: 30px; }
    .guest-section h3 { 
        font-family: var(--font-title); 
        color: var(--primary); 
        border-bottom: 1px solid #f0f0f0;
        padding-bottom: 10px;
    }
    .hidden { display: none; }
    .plus-one-toggle {
        background: #fdfcf9;
        padding: 20px;
        border-radius: 10px;
        margin-bottom: 30px;
        border: 1px dashed var(--primary);
    }
    #status-message { font-size: 0.9rem; padding: 10px; border-radius: 5px; margin-top: 15px; }
    .error-msg { background: #fee2e2; color: #b91c1c; }
    .success-msg { background: #dcfce7; color: #15803d; }
</style>

<script>
    function toggleGuest2() {
        const isWithPlusOne = document.getElementById('plusOne').value === 'Oui';
        const section2 = document.getElementById('section-guest-2');
        const name2 = document.getElementById('name2');
        const meal2 = document.getElementById('meal2');

        if (isWithPlusOne) {
            section2.classList.remove('hidden');
            name2.required = true;
            meal2.required = true;
        } else {
            section2.classList.add('hidden');
            name2.required = false;
            meal2.required = false;
        }
    }

    document.getElementById('wedding-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submit-btn');
        const msg = document.getElementById('status-message');
        
        btn.disabled = true;
        btn.innerText = "Traitement...";
        msg.className = "";
        msg.innerText = "";

        const formData = new FormData(e.target);
        const data = Object.fromEntries(formData.entries());

        try {
            const response = await fetch('/api/rsvp', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data),
            });

            const result = await response.json();

            if (response.ok) {
                msg.innerText = "C'est confirmé ! Nous avons bien reçu votre réponse. ✨";
                msg.className = "success-msg";
                e.target.style.opacity = '0.3';
                e.target.style.pointerEvents = 'none';
                btn.innerText = "Réponse envoyée";
            } else {
                throw new Error(result.error || "Une erreur est survenue");
            }
        } catch (err) {
            msg.innerText = "Oups : " + err.message;
            msg.className = "error-msg";
            btn.disabled = false;
            btn.innerText = "Réessayer";
        }
    });
</script>
