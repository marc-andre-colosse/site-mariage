<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Notre Mariage | RSVP</title>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #af946d; /* Or mat */
            --bg: #fdfcf9;      /* Blanc cassé / Papier */
            --text: #2c3e50;
            --font-title: 'Playfair Display', serif;
            --font-body: 'Lato', sans-serif;
        }

        * { box-sizing: border-box; }

        body {
            font-family: var(--font-body);
            color: var(--text);
            background-color: var(--bg);
            margin: 0;
            line-height: 1.6;
        }

        /* Layout */
        header {
            height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        section {
            max-width: 700px;
            margin: 60px auto;
            padding: 0 20px;
        }

        h1 { font-family: var(--font-title); font-size: 3.5rem; margin-bottom: 10px; font-weight: 400; }
        h2 { font-family: var(--font-title); font-size: 2rem; text-align: center; margin-bottom: 30px; }

        /* Formulaire Style */
        #wedding-form {
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .form-group { margin-bottom: 20px; }

        label { display: block; margin-bottom: 8px; font-weight: bold; font-size: 0.9rem; }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-family: var(--font-body);
            font-size: 1rem;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        button {
            width: 100%;
            padding: 15px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: opacity 0.3s;
            margin-top: 10px;
        }

        button:hover { opacity: 0.8; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }

        #status-message {
            margin-top: 20px;
            text-align: center;
            font-weight: bold;
        }

        .success { color: #27ae60; }
        .error { color: #e74c3c; }

        footer {
            text-align: center;
            padding: 60px 20px;
            font-size: 0.8rem;
            letter-spacing: 1px;
            opacity: 0.6;
        }

        /* Timeline / Déroulement simple */
        .schedule { list-style: none; padding: 0; }
        .schedule li {
            display: flex;
            justify-content: space-between;
            padding: 15px 0;
            border-bottom: 1px solid #eee;
        }
    </style>
</head>
<body>

    <header>
        <h1>Nom 1 & Nom 2</h1>
        <p style="font-style: italic; font-size: 1.2rem;">Nous nous disons "Oui"</p>
        <p>Le 12 Septembre 2026 — Montréal</p>
    </header>

    <section id="details">
        <h2>Le Programme</h2>
        <ul class="schedule">
            <li><span>15h30</span> <strong>Cérémonie Civile</strong></li>
            <li><span>17h00</span> <strong>Cocktail & Photos</strong></li>
            <li><span>19h30</span> <strong>Dîner & Soirée</strong></li>
        </ul>
    </section>

    <section id="rsvp">
        <h2>RSVP</h2>
        <form id="wedding-form">
            <div class="form-group">
                <label for="name">Votre Nom complet</label>
                <input type="text" id="name" name="name" placeholder="Ex: Jean Dupont" required>
            </div>

            <div class="form-group">
                <label for="plusOne">Serez-vous accompagné(e) ?</label>
                <select id="plusOne" name="plusOne">
                    <option value="Non">Je viens seul(e)</option>
                    <option value="Oui">Je viens avec un +1</option>
                </select>
            </div>

            <div class="form-group">
                <label for="meal">Choix de plat / Restrictions alimentaires</label>
                <textarea id="meal" name="meal" rows="3" placeholder="Ex: Menu Végétarien, Allergie aux noix..."></textarea>
            </div>

            <button type="submit" id="submit-btn">Confirmer ma présence</button>
            <p id="status-message"></p>
        </form>
    </section>

    <section id="contact" style="text-align: center;">
        <h2>Une question ?</h2>
        <p>Contactez-nous à <a href="mailto:votre@email.com" style="color: var(--primary);">votre@email.com</a></p>
    </section>

    <footer>
        &copy; 2026 — NOM 1 & NOM 2
    </footer>

    <script>
        document.getElementById('wedding-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            const msg = document.getElementById('status-message');
            
            btn.disabled = true;
            msg.innerText = "Envoi de votre réponse...";
            msg.className = "";

            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());

            try {
                const response = await fetch('/api/rsvp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data),
                });

                if (response.ok) {
                    msg.innerText = "C'est noté ! Merci pour votre réponse. ✨";
                    msg.className = "success";
                    e.target.style.display = "none"; // Cache le formulaire après succès
                } else {
                    throw new Error();
                }
            } catch (err) {
                msg.innerText = "Oups, il y a eu une erreur. Réessayez ou contactez-nous.";
                msg.className = "error";
                btn.disabled = false;
            }
        });
    </script>

</body>
</html>
